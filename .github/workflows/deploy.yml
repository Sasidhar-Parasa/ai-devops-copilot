name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_REGION:     ${{ secrets.GCP_REGION }}
  AR_HOST:        ${{ secrets.GCP_REGION }}-docker.pkg.dev
  AR_REPO:        copilot
  BACKEND_SVC:    ai-copilot-backend
  FRONTEND_SVC:   ai-copilot-frontend

jobs:
  # ════════════════════════════════════════════════════════════════
  # JOB 1 — Lint & Test
  # ════════════════════════════════════════════════════════════════
  test:
    name: 🧪 Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx ruff

      # Lint runs as informational only — exit code is ALWAYS 0
      # Annotations still show in GitHub UI but the job never fails here
      - name: Lint (informational)
        working-directory: backend
        continue-on-error: true
        run: |
          ruff check . \
            --select=E,F,W \
            --ignore=E501 \
            --output-format=github
          exit 0

      - name: Run tests
        working-directory: backend
        env:
          GROQ_API_KEY:   ""
          GEMINI_API_KEY: ""
          GCP_PROJECT_ID: test-project
        run: |
          python -m pytest tests/ -v --tb=short --junitxml=test-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: backend/test-results.xml
          retention-days: 7

  # ════════════════════════════════════════════════════════════════
  # JOB 2 — Build & Deploy Backend
  # ════════════════════════════════════════════════════════════════
  deploy-backend:
    name: 🚀 Deploy Backend
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    outputs:
      backend_url: ${{ steps.deploy.outputs.url }}
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Configure Docker auth
        run: gcloud auth configure-docker ${{ env.AR_HOST }} --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.AR_HOST }}/${{ env.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/backend:latest
            ${{ env.AR_HOST }}/${{ env.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.BACKEND_SVC }}
          region:  ${{ env.GCP_REGION }}
          image:   ${{ env.AR_HOST }}/${{ env.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/backend:${{ github.sha }}
          flags: >-
            --allow-unauthenticated
            --memory=512Mi
            --cpu=1
            --min-instances=0
            --max-instances=5
            --port=8080
            --timeout=300
          env_vars: >-
            LOG_LEVEL=INFO,
            GCP_PROJECT_ID=${{ env.GCP_PROJECT_ID }},
            GCP_REGION=${{ env.GCP_REGION }}
          secrets: GROQ_API_KEY=groq-api-key:latest

      - name: Smoke test backend
        run: |
          URL="${{ steps.deploy.outputs.url }}"
          echo "Testing $URL/api/ping"
          HTTP=000
          for i in $(seq 1 12); do
            HTTP=$(curl -sf -o /dev/null -w "%{http_code}" "$URL/api/ping" || echo 000)
            [ "$HTTP" = "200" ] && { echo "✅ Backend healthy"; curl -s "$URL/api/ping"; break; }
            echo "⏳ Attempt $i/12 (HTTP $HTTP) — waiting 5s..."
            sleep 5
          done
          [ "$HTTP" = "200" ] || { echo "❌ Smoke test failed after 60s"; exit 1; }

      - name: Job summary
        run: |
          {
            echo "## 🚀 Backend Deployed"
            echo "| | |"
            echo "|---|---|"
            echo "| URL | ${{ steps.deploy.outputs.url }} |"
            echo "| Commit | \`${{ github.sha }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"

  # ════════════════════════════════════════════════════════════════
  # JOB 3 — Build & Deploy Frontend
  # ════════════════════════════════════════════════════════════════
  deploy-frontend:
    name: 🎨 Deploy Frontend
    runs-on: ubuntu-latest
    needs: deploy-backend
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Configure Docker auth
        run: gcloud auth configure-docker ${{ env.AR_HOST }} --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.AR_HOST }}/${{ env.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/frontend:latest
            ${{ env.AR_HOST }}/${{ env.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/frontend:${{ github.sha }}
          build-args: |
            VITE_API_URL=${{ needs.deploy-backend.outputs.backend_url }}/api
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.FRONTEND_SVC }}
          region:  ${{ env.GCP_REGION }}
          image:   ${{ env.AR_HOST }}/${{ env.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/frontend:${{ github.sha }}
          flags: >-
            --allow-unauthenticated
            --memory=256Mi
            --cpu=1
            --min-instances=0
            --max-instances=3
            --port=8080

      - name: Job summary
        run: |
          {
            echo "## 🎉 Deployment Complete!"
            echo ""
            echo "| Service | URL |"
            echo "|---------|-----|"
            echo "| 🌐 **Frontend (your public URL)** | ${{ steps.deploy.outputs.url }} |"
            echo "| ⚙️ Backend | ${{ needs.deploy-backend.outputs.backend_url }} |"
            echo "| 📖 API Docs | ${{ needs.deploy-backend.outputs.backend_url }}/docs |"
          } >> "$GITHUB_STEP_SUMMARY"