# ═══════════════════════════════════════════════════════════════════
#  AI DevOps Copilot — GitHub Actions CI/CD Pipeline
#  Triggers on ANY push to main (no path filter)
# ═══════════════════════════════════════════════════════════════════

name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:   # ← allows manual trigger from GitHub UI

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_REGION:     ${{ secrets.GCP_REGION }}
  AR_HOST:        ${{ secrets.GCP_REGION }}-docker.pkg.dev
  AR_REPO:        copilot
  BACKEND_SVC:    ai-copilot-backend
  FRONTEND_SVC:   ai-copilot-frontend

jobs:
  # ══════════════════════════════════════════════════════════════════
  # JOB 1 — Lint & Test (always runs)
  # ══════════════════════════════════════════════════════════════════
  test:
    name: 🧪 Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx ruff

      - name: Lint (non-blocking)
        working-directory: backend
        run: ruff check . --select=E,F,W --ignore=E501 --output-format=github || true

      - name: Run tests
        working-directory: backend
        env:
          GROQ_API_KEY:   ""
          GEMINI_API_KEY: ""
          GCP_PROJECT_ID: test-project
        run: python -m pytest tests/ -v --tb=short --junitxml=test-results.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: backend/test-results.xml
          retention-days: 7

  # ══════════════════════════════════════════════════════════════════
  # JOB 2 — Build & Deploy Backend (push to main only)
  # ══════════════════════════════════════════════════════════════════
  deploy-backend:
    name: 🚀 Deploy Backend
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    outputs:
      backend_url: ${{ steps.deploy.outputs.url }}

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Configure Docker auth
        run: gcloud auth configure-docker ${{ env.AR_HOST }} --quiet

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file:    ./backend/Dockerfile
          push:    true
          tags: |
            ${{ env.AR_HOST }}/${{ env.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/backend:latest
            ${{ env.AR_HOST }}/${{ env.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/backend:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Deploy backend to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.BACKEND_SVC }}
          region:  ${{ env.GCP_REGION }}
          image:   ${{ env.AR_HOST }}/${{ env.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/backend:${{ github.sha }}
          flags: >-
            --allow-unauthenticated
            --memory=512Mi
            --cpu=1
            --min-instances=0
            --max-instances=5
            --port=8080
            --timeout=300
          env_vars: >-
            LOG_LEVEL=INFO,
            GCP_PROJECT_ID=${{ env.GCP_PROJECT_ID }},
            GCP_REGION=${{ env.GCP_REGION }}
          secrets: >-
            GROQ_API_KEY=groq-api-key:latest

      - name: Smoke test backend
        run: |
          URL="${{ steps.deploy.outputs.url }}"
          echo "Backend URL: $URL"
          for i in $(seq 1 12); do
            HTTP=$(curl -sf -o /dev/null -w "%{http_code}" "$URL/api/ping" || echo 000)
            if [ "$HTTP" = "200" ]; then
              echo "✅ Backend healthy"
              curl -s "$URL/api/ping"
              break
            fi
            echo "⏳ Attempt $i/12 — HTTP $HTTP — waiting 5s..."
            sleep 5
          done
          [ "$HTTP" = "200" ] || (echo "❌ Smoke test failed" && exit 1)

      - name: Summary
        run: |
          echo "## 🚀 Backend Deployed" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| URL | ${{ steps.deploy.outputs.url }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Image | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY

  # ══════════════════════════════════════════════════════════════════
  # JOB 3 — Build & Deploy Frontend (after backend)
  # ══════════════════════════════════════════════════════════════════
  deploy-frontend:
    name: 🎨 Deploy Frontend
    runs-on: ubuntu-latest
    needs: deploy-backend
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Configure Docker auth
        run: gcloud auth configure-docker ${{ env.AR_HOST }} --quiet

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      # ── Build frontend with backend URL baked in ─────────────────
      - name: Build & push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file:    ./frontend/Dockerfile
          push:    true
          tags: |
            ${{ env.AR_HOST }}/${{ env.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/frontend:latest
            ${{ env.AR_HOST }}/${{ env.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/frontend:${{ github.sha }}
          build-args: |
            VITE_API_URL=${{ needs.deploy-backend.outputs.backend_url }}/api
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Deploy frontend to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.FRONTEND_SVC }}
          region:  ${{ env.GCP_REGION }}
          image:   ${{ env.AR_HOST }}/${{ env.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/frontend:${{ github.sha }}
          flags: >-
            --allow-unauthenticated
            --memory=256Mi
            --cpu=1
            --min-instances=0
            --max-instances=3
            --port=8080

      - name: Final summary
        run: |
          echo "## 🎉 Deployment Complete!" >> $GITHUB_STEP_SUMMARY
          echo "| Service | URL |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| 🌐 Frontend | ${{ steps.deploy.outputs.url }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ⚙️ Backend  | ${{ needs.deploy-backend.outputs.backend_url }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 📖 API Docs | ${{ needs.deploy-backend.outputs.backend_url }}/docs |" >> $GITHUB_STEP_SUMMARY